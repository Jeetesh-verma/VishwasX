services:
  - type: web
    name: vishwasx-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false   # You will paste the value manually in the Render dashboard
      - key: CORS_ORIGIN
        sync: false   # Paste your Vercel frontend URL here
