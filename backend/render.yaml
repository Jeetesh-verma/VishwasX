services:
  - type: web
    name: vishwasx-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false   # Set this manually in Render dashboard (secret)
      - key: CORS_ORIGIN
        value: "*"
